steps:
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm ci
        VITE_API_BASE_URL=${_API_BASE_URL} npm run build

  - name: node:20
    secretEnv:
      - FIREBASE_TOKEN
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --project ${_FIREBASE_PROJECT_ID} --only hosting --token "$$FIREBASE_TOKEN"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN

substitutions:
  _FIREBASE_PROJECT_ID: your-firebase-project-id
  _API_BASE_URL: https://repolens-backend-xxxxx-uc.a.run.app
